<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="ink" x1="10" y1="12" x2="118" y2="116" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2EF2C2"/>
      <stop offset="1" stop-color="#0C7C67"/>
    </linearGradient>
    <linearGradient id="shine" x1="26" y1="20" x2="102" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- graphite tile -->
  <rect x="8" y="8" width="112" height="112" rx="26" fill="#0B0F12"/>
  <rect x="8" y="8" width="112" height="112" rx="26" fill="url(#shine)"/>
  <rect x="8" y="8" width="112" height="112" rx="26" fill="none" stroke="#203036" stroke-width="2"/>

  <!-- vitals strip -->
  <rect x="22" y="28" width="84" height="18" rx="9" fill="#0F171B" stroke="#203036" stroke-width="2"/>
  <path d="M30 37 H44 L49 31 L57 45 L63 35 H78" fill="none" stroke="url(#ink)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)"/>

  <!-- pulse glyph -->
  <path d="M64 94c-13-7-24-16-24-30 0-11 8-19 19-19 6 0 10 3 12 6 2-3 6-6 12-6 11 0 19 8 19 19 0 14-11 23-24 30z"
        fill="none" stroke="url(#ink)" stroke-width="5" stroke-linejoin="round" filter="url(#softGlow)"/>
</svg>
